<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #03030a;
      --surface:   rgba(255,255,255,0.028);
      --surface-h: rgba(255,255,255,0.055);
      --border:    rgba(255,255,255,0.065);
      --border-h:  rgba(129,140,248,0.55);
      --text:      #bfc8e0;
      --text-h:    #eaedf8;
      --muted:     #434963;
      --accent:    #818cf8;
      --accent2:   #a78bfa;
      --glow1:     rgba(99,102,241,0.18);
      --glow2:     rgba(167,139,250,0.12);
      --sans:      'Syne', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background layers ─────────────────────────────────────────────── */

    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 10%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 10%, transparent 100%);
    }

    .glows {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .glows::before {
      content: '';
      position: absolute;
      width: 800px; height: 800px;
      top: -300px; left: -200px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow1) 0%, transparent 65%);
      animation: floatA 18s ease-in-out infinite alternate;
    }
    .glows::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      bottom: -200px; right: -100px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow2) 0%, transparent 65%);
      animation: floatB 22s ease-in-out infinite alternate;
    }
    @keyframes floatA {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 80px) scale(1.1); }
    }
    @keyframes floatB {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-50px, -60px) scale(1.08); }
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .shell {
      position: relative; z-index: 1;
      max-width: 840px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header { margin-bottom: 3.5rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(129,140,248,0.08);
      border: 1px solid rgba(129,140,248,0.2);
      padding: 0.28em 0.8em;
      border-radius: 99px;
      margin-bottom: 1.6rem;
    }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
      50%       { opacity: 0.25; box-shadow: none; }
    }

    h1 {
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.035em;
      background: linear-gradient(135deg, #e8ecf8 0%, #818cf8 45%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .sub {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .sub-count { color: var(--accent); }

    /* ── Presentation list ─────────────────────────────────────────────── */
    #list { display: flex; flex-direction: column; gap: 0.55rem; }

    .item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.1rem 1.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: border-color 0.2s, background 0.2s, color 0.2s, transform 0.18s;
    }

    /* Scan-line sweep */
    .item::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(129,140,248,0.07) 50%, transparent 60%);
      transform: translateX(-110%);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    /* Left accent bar */
    .item::before {
      content: '';
      position: absolute;
      left: 0; top: 22%; bottom: 22%;
      width: 2px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 2px;
      opacity: 0;
      transform: scaleY(0.4);
      transition: opacity 0.2s, transform 0.2s;
    }

    .item:hover {
      border-color: var(--border-h);
      background: var(--surface-h);
      color: var(--text-h);
      transform: translateX(4px);
    }
    .item:hover::after  { transform: translateX(110%); }
    .item:hover::before { opacity: 1; transform: scaleY(1); }
    .item:hover .item-idx { color: var(--accent); }
    .item:hover .arrow    { opacity: 1; transform: translate(2px, -2px); }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .item-idx {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      min-width: 1.8rem;
      text-align: right;
      flex-shrink: 0;
      user-select: none;
      transition: color 0.2s;
    }

    .item-body { flex: 1; min-width: 0; }

    .item-name {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.22rem;
    }

    .item-meta {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta .sep { margin: 0 0.35em; opacity: 0.35; }

    .arrow {
      font-size: 0.8rem;
      color: var(--accent);
      opacity: 0.35;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.2s;
    }

    /* ── Empty state ───────────────────────────────────────────────────── */
    .empty {
      padding: 5rem 2rem;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(255,255,255,0.01);
      animation: slideUp 0.4s ease forwards;
    }
    .empty-glyph {
      font-size: 1.8rem;
      margin-bottom: 0.85rem;
      opacity: 0.4;
    }
    .empty p {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Footer ────────────────────────────────────────────────────────── */
    footer {
      margin-top: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
    }

    .admin-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.62rem;
      padding: 0.3em 0.75em;
      border: 1px solid rgba(129,140,248,0.2);
      border-radius: 99px;
      transition: background 0.15s, border-color 0.15s;
    }
    .admin-link:hover {
      background: rgba(129,140,248,0.1);
      border-color: rgba(129,140,248,0.45);
    }
  </style>
</head>
<body>

<div class="glows"></div>

<div class="shell">
  <header>
    <div class="badge"><span class="badge-dot"></span>Presentation Library</div>
    <h1>Presentation<br>Hub</h1>
    <p class="sub">// <span class="sub-count" id="subtitle">initializing…</span></p>
  </header>

  <div id="list"></div>

  <footer>
    <span id="footer-count"></span>
    <a href="/admin" class="admin-link">Admin ↗</a>
  </footer>
</div>

<script>
  async function load() {
    const list = document.getElementById('list');
    try {
      const res  = await fetch('/api/presentations');
      const data = await res.json();

      const sub = document.getElementById('subtitle');
      const fc  = document.getElementById('footer-count');

      if (data.length === 0) {
        sub.textContent = 'no files indexed';
        fc.textContent  = '— empty —';
        list.innerHTML  = `
          <div class="empty">
            <div class="empty-glyph">◻</div>
            <p>No presentations have been uploaded yet.</p>
          </div>`;
        return;
      }

      sub.textContent = `${data.length} file${data.length !== 1 ? 's' : ''} indexed`;
      fc.textContent  = `${data.length} presentation${data.length !== 1 ? 's' : ''}`;

      data.forEach((p, i) => {
        const date = new Date(p.updatedAt).toLocaleDateString(undefined, {
          year: 'numeric', month: 'short', day: 'numeric'
        });
        const size = p.size < 1024
          ? `${p.size}B`
          : p.size < 1048576
            ? `${(p.size / 1024).toFixed(1)}KB`
            : `${(p.size / 1048576).toFixed(1)}MB`;

        const a = document.createElement('a');
        a.className = 'item';
        a.href      = p.url;
        a.target    = '_blank';
        a.rel       = 'noopener';
        a.style.animationDelay = `${i * 65}ms`;
        a.innerHTML = `
          <span class="item-idx">${String(i + 1).padStart(2, '0')}</span>
          <div class="item-body">
            <div class="item-name">${esc(p.displayName)}</div>
            <div class="item-meta">${esc(p.filename)}<span class="sep">·</span>${date}<span class="sep">·</span>${size}</div>
          </div>
          <span class="arrow">↗</span>`;
        list.appendChild(a);
      });
    } catch {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-glyph">⚠</div>
          <p>Could not load presentations.</p>
        </div>`;
      document.getElementById('subtitle').textContent = 'connection error';
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  load();
</script>
</body>
</html>
