name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Copy env file
        run: cp .env.example .env

      - name: Start API
        run: docker compose up -d api

      - name: Wait for API healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' presentation-hub-api 2>/dev/null || echo "waiting")
            echo "API health: $STATUS ($i/30)"
            [ "$STATUS" = "healthy" ] && break
            if [ "$i" = "30" ]; then
              echo "API never became healthy — container logs:"
              docker logs presentation-hub-api
              exit 1
            fi
            sleep 3
          done

      - name: Start nginx
        run: docker compose up -d nginx

      - name: Smoke test — public API
        run: curl -sf http://localhost:8080/api/presentations

      - name: Smoke test — health endpoint
        run: curl -sf http://localhost:8080/api/health

      - name: Smoke test — public page
        run: curl -sf http://localhost:8080/ | grep -q "Presentation"

      - name: Smoke test — admin page requires no redirect (SPA)
        run: curl -sf http://localhost:8080/admin | grep -q "Admin Panel"

      - name: Tear down
        if: always()
        run: docker compose down
