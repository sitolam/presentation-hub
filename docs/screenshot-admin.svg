  <rect x="1226" y="81" width="26" height="18" rx="9" fill="rgba(108,138,255,0.12)"/>
  <text x="1239" y="94" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="10" fill="#6c8aff">3</text>

  <!--
    Cards x=348 w=904  h=66  gap=8
    icon box 36×36 at x=366, icon content: screen 22×13 at (373, icon_y+5), stand/base below
    4 action btns 30×30 gap=5.6: x = 1097 / 1133 / 1169 / 1205   right-edge=1234
    btn center-y = card_center_y - 15
  -->

  <!-- ── Card 1  y=120  center=153 ───────────────────────────────── -->
  <rect x="348" y="120" width="904" height="66" rx="10"
        fill="#111318" stroke="#21252f" stroke-width="1"/>
  <!-- icon box -->
  <rect x="366" y="134" width="36" height="36" rx="8" fill="rgba(108,138,255,0.1)"/>
  <!-- monitor: screen 22×13 -->
  <rect x="373" y="139" width="22" height="13" rx="1.5"
        fill="none" stroke="rgba(108,138,255,0.55)" stroke-width="1.5"/>
  <rect x="381" y="152" width="6" height="5"   fill="rgba(108,138,255,0.4)"/>
  <rect x="377" y="157" width="14" height="2" rx="1" fill="rgba(108,138,255,0.4)"/>
  <!-- text -->
  <text x="416" y="148" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="600" fill="#dde2f0">Q3 Strategy Overview</text>
  <text x="416" y="163" font-family="'Courier New',monospace" font-size="9.5"
        fill="#525870">q3-strategy-overview.html · 84.2 KB · Jan 12, 2025</text>
  <!-- 4 action buttons  btn-y = 153-15 = 138 -->
  <rect x="1097" y="138" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1112" y="157" text-anchor="middle" font-size="13" fill="#525870">↗</text>
  <rect x="1133" y="138" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <!-- pencil icon: diagonal line + tip -->
  <line x1="1144" y1="161" x2="1156" y2="144" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1142" y1="163" x2="1144" y2="161" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1142" y1="163" x2="1145" y2="163" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="1169" y="138" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1184" y="157" text-anchor="middle" font-size="13" fill="#525870">↑</text>
  <rect x="1205" y="138" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1220" y="157" text-anchor="middle" font-size="13" fill="#525870">✕</text>

  <!-- ── Card 2  y=194  center=227 ───────────────────────────────── -->
  <rect x="348" y="194" width="904" height="66" rx="10"
        fill="#111318" stroke="#21252f" stroke-width="1"/>
  <rect x="366" y="208" width="36" height="36" rx="8" fill="rgba(108,138,255,0.1)"/>
  <rect x="373" y="213" width="22" height="13" rx="1.5"
        fill="none" stroke="rgba(108,138,255,0.55)" stroke-width="1.5"/>
  <rect x="381" y="226" width="6" height="5"   fill="rgba(108,138,255,0.4)"/>
  <rect x="377" y="231" width="14" height="2" rx="1" fill="rgba(108,138,255,0.4)"/>
  <text x="416" y="222" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="600" fill="#dde2f0">Product Roadmap 2025</text>
  <text x="416" y="237" font-family="'Courier New',monospace" font-size="9.5"
        fill="#525870">product-roadmap-2025.html · 112.7 KB · Jan 8, 2025</text>
  <!-- buttons  y=212 -->
  <rect x="1097" y="212" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1112" y="231" text-anchor="middle" font-size="13" fill="#525870">↗</text>
  <rect x="1133" y="212" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <line x1="1144" y1="235" x2="1156" y2="218" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1142" y1="237" x2="1144" y2="235" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1142" y1="237" x2="1145" y2="237" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="1169" y="212" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1184" y="231" text-anchor="middle" font-size="13" fill="#525870">↑</text>
  <!-- delete hovered: red border + red fill -->
  <rect x="1205" y="212" width="30" height="30" rx="6"
        fill="rgba(255,95,95,0.06)" stroke="#ff5f5f" stroke-width="1"/>
  <text x="1220" y="231" text-anchor="middle" font-size="13" fill="#ff5f5f">✕</text>

  <!-- ── Card 3  y=268  center=301 ───────────────────────────────── -->
  <rect x="348" y="268" width="904" height="66" rx="10"
        fill="#111318" stroke="#21252f" stroke-width="1"/>
  <rect x="366" y="282" width="36" height="36" rx="8" fill="rgba(108,138,255,0.1)"/>
  <rect x="373" y="287" width="22" height="13" rx="1.5"
        fill="none" stroke="rgba(108,138,255,0.55)" stroke-width="1.5"/>
  <rect x="381" y="300" width="6" height="5"   fill="rgba(108,138,255,0.4)"/>
  <rect x="377" y="305" width="14" height="2" rx="1" fill="rgba(108,138,255,0.4)"/>
  <text x="416" y="296" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="600" fill="#dde2f0">Engineering All-Hands</text>
  <text x="416" y="311" font-family="'Courier New',monospace" font-size="9.5"
        fill="#525870">engineering-all-hands.html · 67.4 KB · Dec 19, 2024</text>
  <!-- buttons  y=286 -->
  <rect x="1097" y="286" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1112" y="305" text-anchor="middle" font-size="13" fill="#525870">↗</text>
  <rect x="1133" y="286" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <line x1="1144" y1="309" x2="1156" y2="292" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1142" y1="311" x2="1144" y2="309" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1142" y1="311" x2="1145" y2="311" stroke="#525870" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="1169" y="286" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1184" y="305" text-anchor="middle" font-size="13" fill="#525870">↑</text>
  <rect x="1205" y="286" width="30" height="30" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1220" y="305" text-anchor="middle" font-size="13" fill="#525870">✕</text>

</svg>
