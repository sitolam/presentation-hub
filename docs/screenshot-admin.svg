<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">

  <!-- bg -->
  <rect width="1280" height="720" fill="#08090c"/>

  <!-- ══ TOPBAR  h=56 ════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="1280" height="56" fill="#111318"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#21252f" stroke-width="1"/>

  <!-- logo box 26×26 at x=28,y=15 -->
  <rect x="28" y="15" width="26" height="26" rx="6" fill="#6c8aff"/>
  <!-- mini monitor inside logo: screen 18×11 at (32,19), stand 4×3, base 10×1.5 -->
  <rect x="32" y="19" width="18" height="11" rx="1.5" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
  <rect x="39" y="30" width="4" height="3"   fill="rgba(255,255,255,0.75)"/>
  <rect x="36" y="33" width="10" height="1.5" rx="0.5" fill="rgba(255,255,255,0.75)"/>

  <!-- title + admin badge -->
  <text x="66" y="34" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13.5" font-weight="700" fill="#dde2f0">Presentation Hub</text>
  <rect x="200" y="21" width="44" height="16" rx="8" fill="rgba(108,138,255,0.15)"/>
  <text x="222" y="33" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="9.5" fill="#6c8aff">Admin</text>

  <!-- right controls: username, "Public site ↗", "Log out" -->
  <text x="1028" y="34" font-family="'Courier New',monospace" font-size="11" fill="#525870">admin</text>
  <rect x="1092" y="18" width="80" height="22" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1132" y="33" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="11.5" font-weight="600" fill="#dde2f0">Public site ↗</text>
  <rect x="1184" y="18" width="68" height="22" rx="6" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="1218" y="33" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="11.5" font-weight="600" fill="#dde2f0">Log out</text>

  <!-- ══ LEFT PANEL  x=0 w=320  bg=#111318 ═════════════════════════════ -->
  <rect x="0" y="57" width="320" height="663" fill="#111318"/>
  <line x1="320" y1="57" x2="320" y2="720" stroke="#21252f" stroke-width="1"/>

  <!-- panel title -->
  <text x="28" y="96" font-family="'Courier New',monospace" font-size="10.5"
        font-weight="600" fill="#525870" letter-spacing="2">UPLOAD PRESENTATION</text>

  <!-- "DISPLAY NAME *" label -->
  <text x="28" y="129" font-family="'Courier New',monospace" font-size="10.5"
        fill="#525870" letter-spacing="1">DISPLAY NAME *</text>

  <!-- f-input  y=135 h=34 -->
  <rect x="28" y="135" width="264" height="34" rx="7" fill="#181b22" stroke="#21252f" stroke-width="1"/>
  <text x="42" y="157" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" fill="#525870">e.g. Q3 Results</text>

  <!-- dropzone  y=185 h=100 -->
  <rect x="28" y="185" width="264" height="100" rx="9" fill="transparent"
        stroke="#21252f" stroke-width="2" stroke-dasharray="6 3"/>
  <!-- document icon centered at (160,224) — 16×20px -->
  <polygon points="152,214 161,214 168,221 168,234 152,234"
           fill="rgba(108,138,255,0.1)" stroke="rgba(108,138,255,0.5)" stroke-width="1.5"/>
  <polyline points="161,214 161,221 168,221"
            fill="none" stroke="rgba(108,138,255,0.5)" stroke-width="1.5"/>
  <line x1="156" y1="225" x2="164" y2="225" stroke="rgba(108,138,255,0.4)" stroke-width="1"/>
  <line x1="156" y1="229" x2="164" y2="229" stroke="rgba(108,138,255,0.4)" stroke-width="1"/>
  <text x="160" y="248" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" fill="#525870">Drop a <tspan fill="#6c8aff" font-weight="600">.html</tspan> file or click</text>

  <!-- upload button  y=301 h=37 disabled -->
  <rect x="28" y="301" width="264" height="37" rx="8" fill="#6c8aff" opacity="0.38"/>
  <text x="160" y="324" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="700" fill="white">↑ Upload</text>

  <!-- ══ RIGHT PANEL  x=320 w=960  bg=#08090c ══════════════════════════ -->
  <rect x="320" y="57" width="960" height="663" fill="#08090c"/>

  <!-- list header -->
  <text x="348" y="96" font-family="'Courier New',monospace" font-size="10.5"
