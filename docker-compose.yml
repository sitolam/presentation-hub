services:
  app:
    build: .
    image: ghcr.io/sitolam/presentation-hub:latest
    container_name: presentation-hub
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    env_file: .env
    volumes:
      - ./presentations:/data/presentations
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
